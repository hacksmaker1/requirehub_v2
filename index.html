<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RequireHub</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: Inter, Arial, sans-serif; }
body { background: linear-gradient(135deg, #0b0f1a, #111827); color: white; min-height: 100vh; }
.sidebar {
    position: fixed; left: 0; top: 0; width: 240px; height: 100vh;
    background: rgba(15,15,15,0.98); border-right: 1px solid #252525;
    padding: 20px; display: none; z-index: 100;
}
.logo { font-size: 28px; font-weight: bold; color: #00a2ff; margin-bottom: 30px; }
.navBtn {
    width: 100%; background: #181818; border: 1px solid #2f2f2f;
    color: white; padding: 14px; border-radius: 12px; margin-top: 10px;
    cursor: pointer; text-align: left; font-size: 14px;
}
.navBtn:hover { background: #222; }
.navBtn.active { background: #00a2ff22; border-color: #00a2ff55; color: #00a2ff; }
.main { margin-left: 0; padding: 30px; transition: 0.3s; }
.loginBox {
    width: 420px; background: rgba(18,18,18,0.95); border: 1px solid #2a2a2a;
    border-radius: 18px; padding: 25px; margin: auto; margin-top: 100px;
}
.panel { display: none; margin-left: 270px; padding: 30px; }
.topbar {
    background: rgba(15,15,15,0.9); border: 1px solid #262626;
    padding: 18px; border-radius: 18px; display: flex;
    justify-content: space-between; align-items: center; margin-bottom: 20px; position: relative;
}
.welcome { font-size: 24px; font-weight: bold; }
.topbarRight { display: flex; align-items: center; gap: 12px; }
.searchBox { width: 260px; margin-top: 0 !important; }
.profileBtn {
    width: 42px; height: 42px; border-radius: 50%; background: #00a2ff;
    border: none; color: white; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-weight: bold; flex-shrink: 0; margin-top: 0;
}
/* Settings dropdown */
.settingsDropdown {
    display: none; position: absolute; right: 18px; top: 72px;
    background: #111; border: 1px solid #2b2b2b; border-radius: 16px;
    padding: 20px; width: 320px; z-index: 200; box-shadow: 0 8px 32px #000a;
}
.settingsDropdown.open { display: block; }
.settingsDropdown h3 { font-size: 16px; margin-bottom: 16px; color: #ccc; }
.settRow { margin-bottom: 14px; }
.settRow label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
.settRow input { margin-top: 0; }
.settRow .showToggle {
    background: none; border: none; color: #00a2ff; font-size: 12px;
    cursor: pointer; margin-top: 6px; padding: 0; font-weight: normal;
}
.settSuccess { color: #4ecb71; font-size: 13px; margin-top: 8px; display: none; }
.divider { border: none; border-top: 1px solid #2b2b2b; margin: 16px 0; }
.tabContent { display: none; }
.tabContent.active { display: block; }
.cardGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
.card { background: rgba(20,20,20,0.95); border: 1px solid #2f2f2f; border-radius: 18px; padding: 18px; }
.cardTitle { font-size: 20px; font-weight: bold; margin-bottom: 6px; }
.requireText { color: #7ecbff; word-break: break-all; margin-bottom: 14px; }
.badge { display: inline-block; background: #00a2ff22; color: #00a2ff; font-size: 11px; padding: 3px 8px; border-radius: 6px; margin-bottom: 8px; }
.inputGroup { background: rgba(15,15,15,0.9); border: 1px solid #2b2b2b; border-radius: 18px; padding: 20px; margin-bottom: 20px; }
.inviteBox { background: rgba(15,15,15,0.9); border: 1px solid #2b2b2b; border-radius: 18px; padding: 20px; }
.inviteKeyBox { background: #1c1c1c; border: 1px solid #303030; padding: 14px; border-radius: 12px; margin-top: 12px; font-weight: bold; color: #7ecbff; word-break: break-all; }
.chatBox { background: rgba(15,15,15,0.9); border: 1px solid #2b2b2b; border-radius: 18px; display: flex; flex-direction: column; height: 500px; }
.chatMessages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.chatMsg { max-width: 70%; padding: 12px 16px; border-radius: 14px; font-size: 14px; line-height: 1.5; }
.chatMsg.mine { background: #00a2ff; align-self: flex-end; border-bottom-right-radius: 4px; }
.chatMsg.theirs { background: #1e1e1e; border: 1px solid #2f2f2f; align-self: flex-start; border-bottom-left-radius: 4px; }
.chatMsg .msgUser { font-size: 11px; opacity: 0.7; margin-bottom: 4px; font-weight: bold; }
.chatMsg .msgTime { font-size: 10px; opacity: 0.5; margin-top: 4px; text-align: right; }
.chatInputRow { display: flex; gap: 10px; padding: 16px; border-top: 1px solid #2b2b2b; }
.chatInputRow input { margin-top: 0; flex: 1; }
.chatInputRow button { margin-top: 0; padding: 13px 20px; }
input { width: 100%; background: #1c1c1c; border: 1px solid #303030; color: white; padding: 14px; border-radius: 12px; margin-top: 12px; outline: none; }
button { background: #00a2ff; border: none; color: white; padding: 13px; border-radius: 12px; margin-top: 12px; cursor: pointer; font-weight: bold; }
.rowBtns { display: flex; gap: 10px; }
.rowBtns button { flex: 1; }
.btnDanger { background: #c0392b !important; }
.btnGray { background: #2a2a2a !important; color: #aaa !important; }
.status { margin-top: 12px; color: #ff6868; text-align: center; }
.emptyMsg { color: #555; padding: 10px; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="logo">RequireHub</div>
    <button class="navBtn active" id="navScripts">📦 Scripts</button>
    <button class="navBtn" id="navChat">💬 Chat</button>
    <button class="navBtn" id="navInvite">🔑 Invite System</button>
    <button class="navBtn" id="navLogout" style="margin-top:20px">🚪 Logout</button>
</div>

<div class="main" id="main">
    <div class="loginBox" id="loginBox">
        <div class="logo">RequireHub</div>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <input type="text" id="invite" placeholder="Invite Key">
        <button id="signInBtn">Sign In</button>
        <p style="text-align:center;margin-top:14px;font-size:13px;color:#555">Already have an account? <a id="switchToLogin" href="#" style="color:#00a2ff;text-decoration:none">Log In</a></p>
        <div class="status" id="status"></div>
    </div>
</div>

<div class="panel" id="panel">
    <div class="topbar">
        <div class="welcome" id="welcomeMsg">Welcome back</div>
        <div class="topbarRight">
            <input class="searchBox" type="text" id="searchBar" placeholder="Search Scripts">
            <button class="profileBtn" id="profileBtn">?</button>
        </div>

        <!-- Settings Dropdown -->
        <div class="settingsDropdown" id="settingsDropdown">
            <h3>⚙️ Settings</h3>
            <div class="settRow">
                <label>USERNAME</label>
                <input type="text" id="settUsername" placeholder="New username">
            </div>
            <div class="settRow">
                <label>PASSWORD</label>
                <input type="password" id="settPassword" style="color:#7ecbff">
                <button class="showToggle" id="togglePassBtn">👁 Show Password</button>
            </div>
            <button id="saveSettingsBtn" style="width:100%;margin-top:8px">Save Username</button>
            <div class="settSuccess" id="settSuccess">✅ Saved!</div>
        </div>
    </div>

    <div class="tabContent active" id="tab-scripts">
        <div class="inputGroup">
            <h2>Add Require Script</h2>
            <input type="text" id="scriptName" placeholder="Script Name">
            <input type="text" id="requireID" placeholder="Require ID">
            <button id="addScriptBtn">Add Script</button>
        </div>
        <div class="cardGrid" id="scriptList"></div>
    </div>

    <div class="tabContent" id="tab-chat">
        <div class="chatBox">
            <div class="chatMessages" id="chatMessages">
                <div class="emptyMsg">No messages yet. Say hi! 👋</div>
            </div>
            <div class="chatInputRow">
                <input type="text" id="chatInput" placeholder="Type a message...">
                <button id="sendBtn">Send</button>
            </div>
        </div>
    </div>

    <div class="tabContent" id="tab-invite">
        <div class="inviteBox">
            <h2>Invite System</h2>
            <p style="color:#888;margin-top:8px;font-size:13px;">Share this key with people you want to let in:</p>
            <div class="inviteKeyBox" id="currentInvite">Loading...</div>
            <button id="genInviteBtn">🔄 Generate New Key</button>
            <p style="color:#555;font-size:12px;margin-top:8px;">⚠️ Generating a new key invalidates the old one.</p>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
    getFirestore, collection, addDoc, deleteDoc, doc,
    onSnapshot, query, orderBy, serverTimestamp, getDoc, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyAA0dCH1oS0lifNXm_mthvj2zPZR_wM2-A",
    authDomain: "requirehub-11adb.firebaseapp.com",
    projectId: "requirehub-11adb",
    storageBucket: "requirehub-11adb.firebasestorage.app",
    messagingSenderId: "646151442388",
    appId: "1:646151442388:web:d1ad16ff18672baf15d041"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function setStatus(t) { document.getElementById("status").innerText = t; }

async function getInviteKey() {
    try {
        const snap = await getDoc(doc(db, "config", "invite"));
        if (snap.exists()) return snap.data().key;
        await setDoc(doc(db, "config", "invite"), { key: "RH-DEMO2026KEY" });
        return "RH-DEMO2026KEY";
    } catch { return "RH-DEMO2026KEY"; }
}

// ── Sign In
document.getElementById("signInBtn").addEventListener("click", async () => {
    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();
    const isLoginMode = document.getElementById("invite").style.display === "none";
    if (!user || !pass) { setStatus("Fill all fields"); return; }
    if (isLoginMode) {
        // Log In mode - check stored credentials
        const storedUser = localStorage.getItem("username");
        const storedPass = localStorage.getItem("password");
        if (user !== storedUser || pass !== storedPass) { setStatus("Wrong username or password"); return; }
        localStorage.setItem("loggedIn", "true");
        openPanel();
        return;
    }
    const invite = document.getElementById("invite").value.trim();
    if (!invite) { setStatus("Fill all fields"); return; }
    setStatus("Signing in...");
    try {
        const validKey = await getInviteKey();
        if (invite !== validKey && invite !== "RH-DEMO2026KEY") {
            setStatus("Wrong invite key");
            return;
        }
        localStorage.setItem("loggedIn", "true");
        localStorage.setItem("username", user);
        localStorage.setItem("password", pass);
        openPanel();
    } catch(err) {
        setStatus("Error: " + err.message);
    }
});

// ── Logout
function doLogout() {
    localStorage.removeItem("loggedIn");
    location.reload();
}
document.getElementById("navLogout").addEventListener("click", doLogout);

// ── Profile button & settings dropdown
const profileBtn = document.getElementById("profileBtn");
const dropdown = document.getElementById("settingsDropdown");

profileBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    dropdown.classList.toggle("open");
    // Fill in current values
    document.getElementById("settUsername").value = localStorage.getItem("username") || "";
    document.getElementById("settPassword").value = localStorage.getItem("password") || "";
    document.getElementById("settPassword").type = "text";
    document.getElementById("togglePassBtn").innerText = "🙈 Hide Password";
});

document.addEventListener("click", (e) => {
    if (!dropdown.contains(e.target) && e.target !== profileBtn) {
        dropdown.classList.remove("open");
    }
});

// Show/hide password
document.getElementById("togglePassBtn").addEventListener("click", (e) => {
    e.stopPropagation();
    const input = document.getElementById("settPassword");
    const btn = document.getElementById("togglePassBtn");
    if (input.type === "password") { input.type = "text"; btn.innerText = "🙈 Hide Password"; }
    else { input.type = "password"; btn.innerText = "👁 Show Password"; }
});

// Switch to log in (no invite key needed)
document.getElementById("switchToLogin").addEventListener("click", (e) => {
    e.preventDefault();
    document.getElementById("invite").style.display = "none";
    document.getElementById("signInBtn").innerText = "Log In";
    e.target.style.display = "none";
    document.querySelector("#loginBox p").innerHTML = 'New here? <a id="switchToSignIn" href="#" style="color:#00a2ff;text-decoration:none">Sign In</a>';
    document.getElementById("switchToSignIn").addEventListener("click", (ev) => {
        ev.preventDefault();
        document.getElementById("invite").style.display = "block";
        document.getElementById("signInBtn").innerText = "Sign In";
        document.querySelector("#loginBox p").innerHTML = 'Already have an account? <a id="switchToLogin2" href="#" style="color:#00a2ff;text-decoration:none">Log In</a>';
        document.getElementById("switchToLogin2").addEventListener("click", (ev2) => {
            ev2.preventDefault();
            document.getElementById("invite").style.display = "none";
            document.getElementById("signInBtn").innerText = "Log In";
            document.querySelector("#loginBox p").innerHTML = 'New here? <a id="switchToSignIn2" href="#" style="color:#00a2ff;text-decoration:none">Sign In</a>';
        });
    });
});

// Save settings
document.getElementById("saveSettingsBtn").addEventListener("click", () => {
    const newName = document.getElementById("settUsername").value.trim();
    const newPass = document.getElementById("settPassword").value.trim();
    if (newName) {
        localStorage.setItem("username", newName);
        const initial = newName.charAt(0).toUpperCase();
        document.getElementById("profileBtn").innerText = initial;
        document.getElementById("welcomeMsg").innerText = "Welcome back, " + newName;
    }
    if (newPass) localStorage.setItem("password", newPass);
    const succ = document.getElementById("settSuccess");
    succ.style.display = "block";
    setTimeout(() => succ.style.display = "none", 2000);
});

// ── Tabs
function showTab(name) {
    document.querySelectorAll(".tabContent").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".navBtn").forEach(b => b.classList.remove("active"));
    document.getElementById("tab-" + name).classList.add("active");
    document.getElementById("nav" + name.charAt(0).toUpperCase() + name.slice(1)).classList.add("active");
}
document.getElementById("navScripts").addEventListener("click", () => showTab("scripts"));
document.getElementById("navChat").addEventListener("click", () => showTab("chat"));
document.getElementById("navInvite").addEventListener("click", () => showTab("invite"));

// ── Invite
document.getElementById("genInviteBtn").addEventListener("click", async () => {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    let key = "RH-";
    for (let i = 0; i < 12; i++) key += chars[Math.floor(Math.random() * chars.length)];
    await setDoc(doc(db, "config", "invite"), { key });
    document.getElementById("currentInvite").innerText = key;
});

// ── Open panel
async function openPanel() {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("panel").style.display = "block";
    document.getElementById("sidebar").style.display = "block";
    document.getElementById("main").style.marginLeft = "240px";
    const user = localStorage.getItem("username") || "User";
    document.getElementById("welcomeMsg").innerText = "Welcome back, " + user;
    document.getElementById("profileBtn").innerText = user.charAt(0).toUpperCase();
    const key = await getInviteKey();
    document.getElementById("currentInvite").innerText = key;
    startScripts();
    startChat();
}

if (localStorage.getItem("loggedIn") === "true") openPanel();

// ── Scripts
document.getElementById("addScriptBtn").addEventListener("click", async () => {
    const name = document.getElementById("scriptName").value.trim();
    const id = document.getElementById("requireID").value.trim();
    if (!name || !id) return;
    await addDoc(collection(db, "scripts"), {
        name, id,
        owner: localStorage.getItem("username") || "unknown",
        createdAt: serverTimestamp()
    });
    document.getElementById("scriptName").value = "";
    document.getElementById("requireID").value = "";
});

document.getElementById("searchBar").addEventListener("keyup", renderScripts);

let allScripts = [];
function startScripts() {
    const q = query(collection(db, "scripts"), orderBy("createdAt", "desc"));
    onSnapshot(q, snap => {
        allScripts = snap.docs.map(d => ({ docId: d.id, ...d.data() }));
        renderScripts();
    });
}

function renderScripts() {
    const list = document.getElementById("scriptList");
    const search = document.getElementById("searchBar").value.toLowerCase();
    const me = localStorage.getItem("username") || "";
    list.innerHTML = "";
    const filtered = allScripts.filter(s =>
        !search || s.name.toLowerCase().includes(search) || s.id.toLowerCase().includes(search)
    );
    if (!filtered.length) { list.innerHTML = `<p class="emptyMsg">No scripts found.</p>`; return; }
    filtered.forEach(s => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
            <div class="badge">by ${s.owner || "unknown"}</div>
            <div class="cardTitle">${s.name}</div>
            <div class="requireText">require(${s.id})</div>
            <div class="rowBtns">
                <button class="copyBtn">Copy</button>
                ${s.owner === me ? `<button class="btnDanger deleteBtn">Delete</button>` : ""}
            </div>`;
        div.querySelector(".copyBtn").addEventListener("click", () => {
            navigator.clipboard.writeText(`require(${s.id})`);
            alert("Copied require(" + s.id + ")");
        });
        if (s.owner === me) {
            div.querySelector(".deleteBtn").addEventListener("click", async () => {
                await deleteDoc(doc(db, "scripts", s.docId));
            });
        }
        list.appendChild(div);
    });
}

// ── Chat
function startChat() {
    const q = query(collection(db, "messages"), orderBy("createdAt", "asc"));
    onSnapshot(q, snap => {
        const box = document.getElementById("chatMessages");
        const me = localStorage.getItem("username") || "";
        box.innerHTML = "";
        if (snap.empty) { box.innerHTML = `<div class="emptyMsg">No messages yet. Say hi! 👋</div>`; return; }
        snap.forEach(d => {
            const m = d.data();
            const isMine = m.user === me;
            const time = m.createdAt?.toDate ? m.createdAt.toDate().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) : "";
            const div = document.createElement("div");
            div.className = "chatMsg " + (isMine ? "mine" : "theirs");
            div.innerHTML = `${!isMine ? `<div class="msgUser">${m.user}</div>` : ""}${m.text}<div class="msgTime">${time}</div>`;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    });
}

async function sendMessage() {
    const input = document.getElementById("chatInput");
    const text = input.value.trim();
    if (!text) return;
    input.value = "";
    await addDoc(collection(db, "messages"), {
        text,
        user: localStorage.getItem("username") || "unknown",
        createdAt: serverTimestamp()
    });
}

document.getElementById("sendBtn").addEventListener("click", sendMessage);
document.getElementById("chatInput").addEventListener("keydown", e => {
    if (e.key === "Enter") sendMessage();
});
</script>
</body>
</html>
